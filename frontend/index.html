<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales & Item Summary Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="app-header py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 m-0">
                <i class="bi bi-graph-up-arrow me-2"></i>Sales Reports Dashboard
            </h1>
        </div>
    </header>

    <main class="container py-4">

        <!-- FILTER SECTION -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white">
                <h2 class="h5 mb-0">
                    <i class="bi bi-funnel me-2"></i>Report Filters
                </h2>
            </div>

            <div class="card-body">
                <div class="row g-3">
                    <div class="col-12 col-sm-6 col-md-3">
                        <label class="form-label">From Date</label>
                        <input type="date" id="dateFrom" class="form-control">
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <label class="form-label">To Date</label>
                        <input type="date" id="dateTo" class="form-control">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <label class="form-label">Trans Type</label>
                        <input type="text" id="transType" class="form-control" placeholder="SI">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <label class="form-label">User</label>
                        <input type="text" id="createdUser" class="form-control" placeholder="Created User">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <label class="form-label">Terminal</label>
                        <input type="text" id="terminalId" class="form-control" placeholder="T1">
                    </div>
                </div>

                <br>

                <div class="modern-button-group">
                    <!-- Desktop View -->
                    <div class="d-none d-md-flex flex-wrap gap-3">
                        <button class="btn-modern btn-modern-primary load-sales-btn" type="button">
                            <i class="bi bi-receipt"></i> Sales Summary
                        </button>

                        <button class="btn-modern btn-modern-accent load-item-btn" type="button">
                            <i class="bi bi-box-seam"></i> Item Summary
                        </button>

                        <button class="btn-modern btn-modern-primary load-qty-btn" type="button">
                            <i class="bi bi-123"></i> Quantity Report
                        </button>

                        <button class="btn-modern btn-modern-dark load-bill-btn" type="button">
                            <i class="bi bi-file-earmark-text"></i> Bill Report
                        </button>

                        <button class="btn-modern btn-modern-accent load-gp-btn" type="button">
                            <i class="bi bi-cash-coin"></i> GP Report
                        </button>

                        <button class="btn-modern btn-modern-primary load-stock-btn" type="button">
                            <i class="bi bi-box-seam"></i> Stock Report
                        </button>

                        <button class="btn-modern btn-modern-accent load-expenses-btn" type="button">
                            <i class="bi bi-receipt"></i> Expenses Report
                        </button>
                        <button class="btn-modern btn-modern-secondary print-report-btn" type="button">
                            <i class="bi bi-printer"></i> Print
                        </button>
                    </div>

                    <!-- Mobile View -->
                    <div class="d-md-none mobile-grid">
                        <button class="btn-modern btn-modern-primary load-sales-btn" type="button">
                            <i class="bi bi-receipt"></i> Sales
                        </button>

                        <button class="btn-modern btn-modern-accent load-item-btn" type="button">
                            <i class="bi bi-box-seam"></i> Item
                        </button>

                        <button class="btn-modern btn-modern-primary load-qty-btn" type="button">
                            <i class="bi bi-123"></i> Quantity
                        </button>

                        <button class="btn-modern btn-modern-dark load-bill-btn" type="button">
                            <i class="bi bi-file-earmark-text"></i> Bill
                        </button>

                        <button class="btn-modern btn-modern-accent load-gp-btn" type="button">
                            <i class="bi bi-cash-coin"></i> GP
                        </button>

                        <button class="btn-modern btn-modern-primary load-stock-btn" type="button">
                            <i class="bi bi-box-seam"></i> Stock
                        </button>

                        <button class="btn-modern btn-modern-accent load-expenses-btn" type="button">
                            <i class="bi bi-receipt"></i> Expenses
                        </button>

                        <button class="btn-modern btn-modern-secondary print-report-btn" type="button">
                            <i class="bi bi-printer"></i> Print
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SUMMARY CARDS -->
        <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <div class="card summary-card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="small text-muted">Record Count</div>
                        <div class="fs-3 fw-bold" id="cardCount">0</div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card summary-card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="small text-muted" id="cardAmountLabel">Total Amount</div>
                        <div class="fs-3 fw-bold" id="cardAmount">0.00</div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card summary-card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="small text-muted" id="cardExtraLabel">Extra Total</div>
                        <div class="fs-3 fw-bold" id="cardExtra">0.00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- REPORT TABLE -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h2 class="h5 mb-0">
                    <i class="bi bi-table me-2"></i>Report Result
                </h2>
                <span class="badge text-bg-primary" id="reportTypeBadge">No Report Loaded</span>
            </div>

            <div class="card-body">
                <div class="row g-2 align-items-center mb-3">
                    <div class="col-12 col-md-6">
                        <div id="pageInfo" class="small text-muted">Showing 0 to 0 of 0 entries</div>
                    </div>

                    <div class="col-12 col-md-6 text-md-end">
                        <div class="d-flex flex-column flex-sm-row justify-content-md-end align-items-stretch align-items-sm-center gap-2">
                            <label for="pageSize" class="small mb-0">Rows per page</label>
                            <select id="pageSize" class="form-select form-select-sm page-size-select">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0" id="reportTable">
                        <thead id="reportHead"></thead>
                        <tbody id="reportBody"></tbody>
                    </table>
                </div>

                <div class="row g-2 align-items-center mt-3">
                    <div class="col-12 col-md-4">
                        <div id="currentPageText" class="small text-muted">Page 0 of 0</div>
                    </div>

                    <div class="col-12 col-md-8">
                        <ul class="pagination pagination-sm justify-content-center justify-content-md-end mb-0 flex-wrap" id="pagination"></ul>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>

</html>
